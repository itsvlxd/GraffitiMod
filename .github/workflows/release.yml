name: release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Semantic Release (dry-run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Inject version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "Releasing version: ${{ steps.semantic.outputs.new_release_version }}"
          sed -i "s/mod_version=.*/mod_version=${{ steps.semantic.outputs.new_release_version }}/" gradle.properties

      - name: Build mod
        if: steps.semantic.outputs.new_release_published == 'true'
        run: ./gradlew build

      - name: Find JAR
        if: steps.semantic.outputs.new_release_published == 'true'
        id: jar
        run: |
          JAR_FILE=$(ls build/libs/*.jar 2>/dev/null | head -1)
          echo "path=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: graffiti-${{ steps.semantic.outputs.new_release_version }}
          path: ${{ steps.jar.outputs.path }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.new_release_published == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release (publish)
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: graffiti-${{ needs.build.outputs.new_release_version }}
          path: build/libs/

      - name: Generate Release Notes
        run: |
          cat > release_body.md << ENDOFFILE
          ## Graffiti Mod v${{ needs.build.outputs.new_release_version }}

          A NeoForge mod for Minecraft 1.21.1 that lets players paint pixels on any block surface.

          ### Features
          - Spray Can item with full color picker (HSB, HEX, brush size)
          - 4 tools: Pencil, Eraser, Fill, Color Picker
          - Multiplayer support with persistent graffiti
          - Depth-aware rendering on complex block shapes

          ### Installation
          1. Install NeoForge 21.1.1+ for Minecraft 1.21.1
          2. Place the JAR in your \`mods/\` folder

          > **Note:** This is a NeoForge mod. Remove any old Fabric versions before installing.
          ENDOFFILE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          tag_name: v${{ needs.build.outputs.new_release_version }}
          name: Graffiti Mod v${{ needs.build.outputs.new_release_version }}
          body_path: release_body.md
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
