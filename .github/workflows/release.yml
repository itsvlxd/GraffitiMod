name: release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Semantic Release (dry-run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Inject version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "Releasing version: ${{ steps.semantic.outputs.new_release_version }}"
          sed -i "s/mod_version=.*/mod_version=${{ steps.semantic.outputs.new_release_version }}/" gradle.properties

      - name: Build mod
        if: steps.semantic.outputs.new_release_published == 'true'
        run: ./gradlew build

      - name: Find JAR
        if: steps.semantic.outputs.new_release_published == 'true'
        id: jar
        run: |
          JAR_FILE=$(ls build/libs/*.jar 2>/dev/null | head -1)
          echo "path=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: graffiti-${{ steps.semantic.outputs.new_release_version }}
          path: ${{ steps.jar.outputs.path }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.new_release_published == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Inject version
        run: |
          sed -i "s/mod_version=.*/mod_version=${{ needs.build.outputs.new_release_version }}/" gradle.properties

      - name: Semantic Release (publish)
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: graffiti-${{ needs.build.outputs.new_release_version }}
          path: build/libs/

      - name: Generate Release Notes
        run: |
          cat > release_body.md << 'RELEASE_EOF'
          ## Graffiti Mod v${{ needs.build.outputs.new_release_version }}

          A NeoForge mod for Minecraft 1.21.1 that lets players paint pixels on any block surface with full color customization, clean graffiti with brushes, and watch it age over time.

          ### Features
          - Spray Can with 12800 durability — right-click to paint (smooth, no cooldown)
          - Full color editor (press C): HSB palette, hue/alpha sliders, HEX input, brush size, brush shape
          - 5 brush shapes: Square, Circle, Rounded, Cloud, Leaky
          - Brush overflow — painting near edges continues onto adjacent blocks
          - Color lock in survival — color can only be set once per can
          - Refill with Red/Blue/Green Dye — preserves settings
          - 4 tools: Pencil, Fill, Picker, Select (cycle via C menu)
          - Select mode: right-click two blocks to mark a region, then save to gallery
          - Gallery (press G): save/paste named designs with auto-rotation and durability cost
          - Preview mode: scroll or PgUp/PgDn to adjust Y offset, right-click to confirm paste
          - Brush (cleaning) and Wet Brush — circular 6×6 area
          - Graffiti aging — desaturates every 5 in-game days (random 2–15%, capped at 85%)
          - Clipboard matches block type, not FIFO order
          - Looping spatial paint sound, equip sound, brush sound — all 3D
          - Multiplayer sync + disk persistence
          - Configurable spray reach (default 8, cap 20)
          - Depth-aware rendering on complex block shapes, greedy meshing, frustum culling
          - All settings per-can via NBT (color, size, shape, lock) — survives drops
          - JEI integration, EN + RO translations

          ### Installation
          1. Install NeoForge 21.1.1+ for Minecraft 1.21.1
          2. Place the JAR in your \`mods/\` folder

          ${{ steps.semantic.outputs.new_release_notes }}
          RELEASE_EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          tag_name: v${{ needs.build.outputs.new_release_version }}
          name: Graffiti Mod v${{ needs.build.outputs.new_release_version }}
          body_path: release_body.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
